      <!-- Dark ankle boots -->
      <path d="M-22,294 Q-26,304 -30,312 Q-28,320 -11,320
               Q-7,312 -9,294Z" fill="#22223a"/>
      <path d="M22,294 Q26,304 30,312 Q28,320 11,320
               Q7,312 9,294Z" fill="#22223a"/>
