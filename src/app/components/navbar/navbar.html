<mat-toolbar class="mat-elevation-z1">
    <div class="brand-container" routerLink="/">
        <img src="assets/images/vantora-logo.png" alt="Vantora Logo" class="brand-logo">
        <div class="brand-text">
            <span class="brand-name">Vantora</span>
            <span class="brand-slogan">Your Smart Travel Companion</span>
        </div>
    </div>
    <span class="spacer"></span>

    <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/destinations" routerLinkActive="active">Destinations</a>
        <a routerLink="/planner" routerLinkActive="active">Trip Planner</a>

        <div class="user-section" *ngIf="authService.user$ | async as user; else guest">
            <button class="profile-trigger" [matMenuTriggerFor]="profileMenu">
                <div class="avatar">{{ (user.displayName || user.email || 'U')[0].toUpperCase() }}</div>
                <div class="profile-user-info">
                    <span class="user-name">{{ user.displayName || 'Traveler' }}</span>
                    <span class="user-email-small">{{ user.email }}</span>
                </div>
                <svg class="dropdown-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M480-360 280-560h400L480-360Z"/></svg>
            </button>
            <mat-menu #profileMenu="matMenu" class="modern-menu" xPosition="before">
                <div class="menu-header">
                    <div class="menu-avatar-large">{{ (user.displayName || user.email || 'U')[0].toUpperCase() }}</div>
                    <div class="menu-user-info">
                        <span class="menu-name">{{ user.displayName || 'Traveler' }}</span>
                        <span class="menu-email">{{ user.email }}</span>
                    </div>
                </div>
                <mat-divider></mat-divider>
                <div class="menu-items-group" style="padding: 4px 0;">
                    <button mat-menu-item class="menu-item" routerLink="/profile">
                        <svg class="menu-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-240v-32q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v32q0 33-23.5 56.5T720-160H240q-33 0-56.5-23.5T160-240Z"/></svg>
                        <span>My Profile</span>
                    </button>
                    <button mat-menu-item class="menu-item" routerLink="/my-trips">
                        <svg class="menu-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor"><path d="m424-424 280-80-80-280-200 360Zm56-56Zm0 320q-83 0-156-31.5T197-277q-54-54-85.5-127T80-560q0-83 31.5-156T197-843q54-54 127-85.5T480-960q83 0 156 31.5T763-843q54 54 85.5 127T880-560q0 83-31.5 156T763-277q-54 54-127 85.5T480-240Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Z"/></svg>
                        <span>My Trip Details</span>
                    </button>
                    <button mat-menu-item (click)="logout()" class="logout-menu-item">
                        <svg class="logout-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#d32f2f"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-56-58 102-102H360v-80h326L584-622l56-58 200 200-200 200Z"/></svg>
                        <span class="logout-text">Logout</span>
                    </button>
                </div>
            </mat-menu>
        </div>

        <ng-template #guest>
            <a mat-button class="login-btn" routerLink="/login" *ngIf="!isLoginPage">Login</a>
            <button mat-raised-button color="accent" class="signup-btn" routerLink="/signup" *ngIf="!isSignupPage">Sign Up</button>
        </ng-template>
    </div>
</mat-toolbar>
